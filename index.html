<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/index.css">
    <title> Campus Connect</title>
</head>
<body>
    <header>
        <h1 id="myh1">Chanda Chema University</h1>
        <img src="images/logo.png" width="100" height="100" alt="logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>

    <div class="gradient-banner">
        <h2>Welcome to Chanda Chema University </h2>
        <p><i> The home of technology and innovation, Chanda Chema University</i></p>
        
    </div>
    <main>
        <section class="slideshow-container">
            <div class="slide fade active">
                <img src="images/logo.png" alt="Logo" style="width:100%">
            </div>
            <div class="slide fade">
                <img src="images/slide show.png" alt="Slide Show" style="width:100%">
            </div>
            <div class="slide fade">
                <img src="images/slideshow1.png" alt="Slideshow 1" style="width:100%">
            </div>
            <button class="prev" onclick="plusSlides(-1)">❮</button>
            <button class="next" onclick="plusSlides(1)">❯</button>
            <button class="download-btn" onclick="downloadCurrentImage()">Download Current Image</button>
        </section>
    </main>

    </footer>
